<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Data</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
        .filter-container { margin-bottom: 20px; }
        .filter, .search { margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Google Sheets Data</h1>
    <div class="filter-container">
        <input type="text" id="searchInput" class="search" placeholder="Search...">
        <select id="groupFilter" class="filter">
            <option value="">All Groups</option>
            <!-- Options will be populated dynamically -->
        </select>
        <button id="filterButton">Filter</button>
    </div>
    <table id="dataTable">
        <thead>
            <tr>
                <th>Group</th>
                <th>Name</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <div id="resultCount"></div>

    <script>
        const dataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEJd-P9_gH7MCHuKgKMNbJYFvIim7iMZegUJ0QXRByQc8bKqIPJHENpY7ukuYZxz7VAOku1esfGNGP/pub?output=csv&gid=1760985047';
        let data = [];

        // Fetch the data from Google Sheets
        fetch(dataUrl)
            .then(response => response.text())
            .then(csvData => {
                const rows = csvData.split('\n').map(row => row.split(','));
                data = rows.slice(1);
                populateTable(data);
                populateFilterOptions(data);
            });

        function populateTable(data) {
            const tableBody = document.querySelector('#dataTable tbody');
            tableBody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
            updateResultCount(data.length);
        }

        function populateFilterOptions(data) {
            const groupSet = new Set(data.map(row => row[0])); // Assuming Group is in first column
            const groupFilter = document.getElementById('groupFilter');
            groupSet.forEach(group => {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = group;
                groupFilter.appendChild(option);
            });
        }

        function updateResultCount(count) {
            document.getElementById('resultCount').textContent = `Total Results: ${count}`;
        }

        document.getElementById('filterButton').onclick = () => {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const groupValue = document.getElementById('groupFilter').value;
            const filteredData = data.filter(row => {
                const matchesGroup = groupValue === '' || row[0] === groupValue;
                const matchesSearch = row.some(cell => cell.toLowerCase().includes(searchValue));
                return matchesGroup && matchesSearch;
            });
            populateTable(filteredData);
        };
    </script>
</body>
</html>
