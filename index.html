<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Google Sheets Data Fetcher</title>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"></script>\n</head>\n<body>\n    <h1>Google Sheets Data Fetcher</h1>\n    <input type="text" id="searchInput" placeholder="Search by Group...">\n    <table id="dataTable" border="1">\n        <thead>\n            <tr>\n                <th>Group</th>\n                <th>Name</th>\n                <th>Value</th>\n            </tr>\n        </thead>\n        <tbody id="dataBody">\n        </tbody>\n    </table>\n    <script>\n        const SHEET_ID = 'YOUR_SHEET_ID'; // Replace with your Google Sheet ID\n        const API_KEY = 'YOUR_API_KEY'; // Replace with your Google API Key\n        const range = 'A1:C100'; // Adjust the range according to your data\n        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;\n\n        async function fetchData() {\n            try {\n                const response = await axios.get(url);\n                displayData(response.data.values);\n            } catch (error) {\n                console.error('Error fetching data:', error);\n            }\n        }\n\n        function displayData(data) {\n            const dataBody = document.getElementById('dataBody');\n            dataBody.innerHTML = ''; // Clear existing data\n            data.forEach((row, index) => { // Assume the first row is headers\n                if (index === 0) return; // Skip header row\n                const tr = document.createElement('tr');\n                row.forEach(cell => {\n                    const td = document.createElement('td');\n                    td.textContent = cell;\n                    tr.appendChild(td);\n                });\n                dataBody.appendChild(tr);\n            });\n        }\n\n        document.getElementById('searchInput').addEventListener('input', function() {\n            const filter = this.value.toLowerCase();\n            const rows = document.querySelectorAll('#dataBody tr');\n            rows.forEach(row => {\n                const groupCell = row.cells[0].textContent.toLowerCase();\n                row.style.display = groupCell.includes(filter) ? '' : 'none';\n            });\n        });\n\n        fetchData();\n    </script>\n</body>\n</html>\n
